<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UK AQ Loading</title>

  <style>
    :root {
      --cream: #f7f0dc;
      --loader-size: 180px;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--cream);
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
    }

	.uk-aq-loader {
	  width: var(--loader-size);
	  height: var(--loader-size);
	  display: block;
	  transform-origin: 50% 50%;
	  animation:
	    ukAqSpin 1s linear infinite,
	    ukAqFadeCycle 8s linear infinite;
	  will-change: transform, opacity;
	}

	@keyframes ukAqSpin {
	  from {
	    transform: rotate(0deg);
	  }

	  to {
	    transform: rotate(360deg);
	  }
	}

	@keyframes ukAqFadeCycle {
	  /* 0.0s */
	  0% {
	    opacity: 0;
	  }

	  /* 0.5s fade in */
	  6.25% {
	    opacity: 1;
	  }

	  /* stay visible until 6.5s */
	  81.25% {
	    opacity: 1;
	  }

	  /* 0.5s fade out */
	  87.5% {
	    opacity: 0;
	  }

	  /* 1.0s hidden pause */
	  100% {
	    opacity: 0;
	  }
	}
    @media (prefers-reduced-motion: reduce) {
      .uk-aq-loader {
        animation: none;
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <img
    class="uk-aq-loader"
    src="file:///Users/mikehinford/Dropbox/Projects/CIC Website/CIC Air Quality Networks/Resources/UK AQ Logo/UK AQ - Loading Q/Figma/UKAQ-Loading.svg"
    alt="UK AQ loading"
  >
</body>
</html>
